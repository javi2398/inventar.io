services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.simple
    container_name: inventar-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - ./docker/apache/000-default.conf:/etc/apache2/sites-available/000-default.conf
    ports:
      - "8000:80"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=inventario
      - DB_USERNAME=postgres
      - DB_PASSWORD=password
    depends_on:
      - postgres
    networks:
      - inventar-network

  postgres:
    image: postgres:16
    container_name: inventar-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: inventario
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - inventar-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: inventar-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@inventar.io
      PGADMIN_DEFAULT_PASSWORD: password
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "8080:80"
    depends_on:
      - postgres
    networks:
      - inventar-network

volumes:
  postgres_data:
    driver: local

networks:
  inventar-network:
    driver: bridge
